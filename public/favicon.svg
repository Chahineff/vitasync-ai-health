<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="vitasync-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="50%" stop-color="#00CED1"/>
      <stop offset="100%" stop-color="#3CB371"/>
    </linearGradient>
  </defs>
  
  <!-- Outer arc with nodes -->
  <path d="M25 35 Q15 50, 20 70 Q25 80, 30 75" stroke="url(#vitasync-gradient)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Top arc -->
  <path d="M35 20 Q50 10, 70 20" stroke="url(#vitasync-gradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Right arc -->
  <path d="M75 30 Q85 50, 75 75" stroke="url(#vitasync-gradient)" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Center V leaves -->
  <path d="M50 85 L35 50 Q40 40, 50 35" fill="url(#vitasync-gradient)"/>
  <path d="M50 85 L65 50 Q60 40, 50 35" fill="url(#vitasync-gradient)"/>
  
  <!-- Inner leaf detail -->
  <path d="M50 75 L42 55 Q45 48, 50 45" fill="white" opacity="0.3"/>
  <path d="M50 75 L58 55 Q55 48, 50 45" fill="white" opacity="0.3"/>
  
  <!-- Orbital nodes -->
  <circle cx="20" cy="68" r="6" fill="url(#vitasync-gradient)"/>
  <circle cx="28" cy="38" r="5" fill="url(#vitasync-gradient)"/>
  <circle cx="50" cy="18" r="7" fill="url(#vitasync-gradient)"/>
  <circle cx="70" cy="22" r="4" fill="url(#vitasync-gradient)"/>
  <circle cx="78" cy="35" r="5" fill="url(#vitasync-gradient)"/>
  
  <!-- Center node -->
  <circle cx="50" cy="38" r="8" fill="url(#vitasync-gradient)"/>
</svg>